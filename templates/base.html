<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spendly{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400;1,14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="{{ url_for('landing') }}" class="nav-brand">
                <span class="brand-icon">◈</span>
                <span class="brand-name">Expendly</span>
            </a>
            <div class="nav-links">
                {% if session.get("user_id") %}
                    <a href="{{ url_for('logout') }}">Sign out</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Sign in</a>
                    <a href="{{ url_for('register') }}" class="nav-cta">Get started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="brand-icon">◈</span>
            <span class="footer-name">Expendly</span>
            <p class="footer-copy">Track every Dollar. Own your finances.</p>
            <a href="/terms">Terms and Conditions</a>
            <a href="/privacy">Privacy Policy</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
